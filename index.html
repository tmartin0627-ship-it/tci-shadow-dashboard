  .header .subtitle { font-size: 13px; color: #999; margin-top: 4px; }

  .top-tabs { display: flex; gap: 0; padding: 16px 40px 0; border-bottom: 1px solid #e5e7eb; }
  .top-tab { background: none; border: none; padding: 10px 20px; font-size: 14px; font-weight: 500; color: #6b7280; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .top-tab:hover { color: #111; }
  .top-tab.active { color: #2563eb; border-bottom-color: #2563eb; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Big return number */
  .hero-return { padding: 8px 40px 0; }
  .hero-return .big-num { font-size: 42px; font-weight: 700; letter-spacing: -1px; }
  .hero-return .change-line { font-size: 15px; margin-top: 2px; display: flex; align-items: center; gap: 8px; }
  .hero-return .change-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 6px; font-weight: 500; font-size: 14px; }

  .pill-red { background: rgba(220,38,38,0.1); color: #dc2626; }
  .hero-return .date-label { color: #999; font-size: 13px; }

  .stats { display: flex; gap: 20px; padding: 20px 40px 8px; flex-wrap: wrap; }
  .stat-card { background: #f8f9fa; border-radius: 10px; padding: 14px 18px; min-width: 145px; border: 1px solid #e5e7eb; }
  .stat-card .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 3px; }
  .stat-card .value { font-size: 20px; font-weight: 600; }
  .stat-card .sub { font-size: 11px; color: #999; margin-top: 2px; }
  .green { color: #16a34a; }
  .red { color: #dc2626; }
  .blue { color: #2563eb; }

  /* Yearly performance cards */
  .yearly-section { padding: 20px 40px; }
  .yearly-section h3 { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; }
  .yearly-grid { display: flex; gap: 14px; flex-wrap: wrap; }
  .year-card { flex: 1; min-width: 220px; background: #f8f9fa; border-radius: 10px; padding: 16px 18px; border: 1px solid #e5e7eb; }
  .year-card .year-title { font-size: 18px; font-weight: 700; color: #111; margin-bottom: 10px; }
  .year-card .yr-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 13px; }
  .year-card .yr-label { color: #111; }
  .year-card .yr-val { font-weight: 600; font-variant-numeric: tabular-nums; }
  .year-card .yr-divider { border-top: 1px solid #e5e7eb; margin: 6px 0; }
  .yr-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 3px; background: #f0fdf4; color: #16a34a; margin-left: 4px; vertical-align: 1px; }
  .yr-link { color: inherit; text-decoration: none; border-bottom: 1px dashed #ccc; cursor: pointer; }
  .yr-link:hover { border-bottom-color: #2563eb; color: #2563eb; }

  /* Range selector */
  .controls-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 40px 0; flex-wrap: wrap; gap: 10px; }
  .range-btns { display: flex; gap: 0; background: #fff; border-radius: 8px; border: 1px solid #d1d5db; overflow: hidden; }
  .range-btn { background: transparent; border: none; color: #6b7280; padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.12s; border-right: 1px solid #e5e7eb; }
  .range-btn:last-child { border-right: none; }
  .range-btn:hover { color: #111; background: #f3f4f6; }
  .range-btn.active { color: #fff; background: #2563eb; }

  .view-toggle { display: flex; gap: 0; background: #fff; border-radius: 8px; border: 1px solid #d1d5db; overflow: hidden; }
  .view-btn { background: transparent; border: none; color: #6b7280; padding: 8px 14px; font-size: 12px; cursor: pointer; transition: all 0.12s; border-right: 1px solid #e5e7eb; }
  .view-btn:last-child { border-right: none; }
  .view-btn:hover { color: #111; background: #f3f4f6; }
  .view-btn.active { color: #fff; background: #374151; }

  .legend-row { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #6b7280; cursor: pointer; user-select: none; }
  .legend-item .swatch { width: 24px; height: 0; border-top: 2.5px solid var(--c); border-radius: 0; }
  .legend-item .swatch.dashed { border-top-style: dashed; background: none; }
  .legend-item.muted { opacity: 0.3; }

  /* Chart */
  .chart-container { padding: 12px 40px 8px; }
  .chart-wrap { background: #fff; border-radius: 12px; padding: 20px 20px 14px; border: 1px solid #e5e7eb; }
  .chart-wrap canvas { width: 100% !important; }

  .events-table tr:hover td { background: #f8f9fb; cursor: pointer; }
  .events-table tr.highlight td { background: #eff6ff; transition: background 0.3s; }
  .events-table a.source-link { color: #2563eb; text-decoration: none; font-size: 12px; white-space: nowrap; }
  .events-table a.source-link:hover { text-decoration: underline; }

  .badge-13d { background: #fef2f2; color: #dc2626; }
  .badge-eu { background: #f0fdf4; color: #16a34a; }
  .badge-activist { background: #faf5ff; color: #9333ea; }
  .badge-proposal { background: #fefce8; color: #a16207; }

  .holdings-table tr.row-decreased td:first-child { border-left: 3px solid #f59e0b; }

  .holdings-controls select { min-width: 360px; }

function updateHero(filtered) {
  const el = document.getElementById('heroReturn');
  const f = filtered[0], l = filtered[filtered.length - 1];
  const retPct = ((l.known / f.known) - 1) * 100;
  const retAbs = l.known - f.known;
  const isPos = retPct >= 0;
  const arrow = isPos ? '\u2191' : '\u2193';
  const pillCls = isPos ? 'pill-green' : 'pill-red';
  const clr = isPos ? 'green' : 'red';
  const fmtDate = d => { const dt = new Date(d); return dt.toLocaleDateString('en-US', {day:'numeric',month:'short',year:'numeric'}); };
  el.innerHTML = `
    <div class="big-num ${clr}">$${l.known.toFixed(2)}</div>
    <div class="change-line">
      <span class="change-pill ${pillCls}">${arrow}${Math.abs(retPct).toFixed(2)}%</span>
      <span class="${clr}">${isPos?'+':''}${retAbs.toFixed(3)}</span>
      <span class="date-label">${fmtDate(f.date)} – ${fmtDate(l.date)}</span>
    </div>`;
}

function updateStats(filtered) {
  const f = filtered[0], l = filtered[filtered.length - 1];
  const retK = ((l.known/f.known)-1)*100;
  const retS = ((l.sp500/f.sp500)-1)*100;
  const alpha = retK - retS;
  const yrs = (new Date(l.date)-new Date(f.date))/(365.25*86400000);
  const annK = yrs > 0.5 ? (Math.pow(l.known/f.known,1/yrs)-1)*100 : null;
  const annS = yrs > 0.5 ? (Math.pow(l.sp500/f.sp500,1/yrs)-1)*100 : null;
  const annStr = annK !== null ? `${annK.toFixed(1)}% ann.` : '';
  const annSStr = annS !== null ? `${annS.toFixed(1)}% ann.` : '';
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="label">Shadow Return</div><div class="value ${retK>=0?'green':'red'}">${retK>=0?'+':''}${retK.toFixed(1)}%</div><div class="sub">${annStr}</div></div>
    <div class="stat-card"><div class="label">S&P 500 TR</div><div class="value ${retS>=0?'green':'red'}">${retS>=0?'+':''}${retS.toFixed(1)}%</div><div class="sub">${annSStr}</div></div>
    <div class="stat-card"><div class="label">Alpha vs S&P</div><div class="value ${alpha>=0?'green':'red'}">${alpha>=0?'+':''}${alpha.toFixed(1)}pp</div></div>
    <div class="stat-card"><div class="label">Growth of $1</div><div class="value blue">$${l.known.toFixed(2)}</div><div class="sub">vs $${l.sp500.toFixed(2)} S&P</div></div>`;
}

function filterByRange(range) {
  const last = DAILY[DAILY.length - 1];
  const endDate = new Date(last.date);
  let startDate;
  switch (range) {
    case '3m':  startDate = new Date(endDate); startDate.setMonth(startDate.getMonth() - 3); break;
    case '6m':  startDate = new Date(endDate); startDate.setMonth(startDate.getMonth() - 6); break;
    case 'ytd': startDate = new Date(endDate.getFullYear(), 0, 1); break;
    case '1y':  startDate = new Date(endDate); startDate.setFullYear(startDate.getFullYear() - 1); break;
    case '2y':  startDate = new Date(endDate); startDate.setFullYear(startDate.getFullYear() - 2); break;
    default:    startDate = new Date('2021-12-01');
  }
  return DAILY.filter(m => new Date(m.date) >= startDate);
}

function filterReturnsByRange(range) {
  const last = DAILY[DAILY.length - 1];
  const endDate = new Date(last.date);
  let startDate;
  switch (range) {
    case '3m':  startDate = new Date(endDate); startDate.setMonth(startDate.getMonth() - 3); break;
    case '6m':  startDate = new Date(endDate); startDate.setMonth(startDate.getMonth() - 6); break;
    case 'ytd': startDate = new Date(endDate.getFullYear(), 0, 1); break;
    case '1y':  startDate = new Date(endDate); startDate.setFullYear(startDate.getFullYear() - 1); break;
    case '2y':  startDate = new Date(endDate); startDate.setFullYear(startDate.getFullYear() - 2); break;
    default:    startDate = new Date('2021-12-01');
  }
  return dailyReturns.filter(m => new Date(m.date) >= startDate);
}

function scrollToEvent(date) {
  const rows = document.querySelectorAll('#eventsTable tbody tr[data-date="' + date + '"]');
  document.querySelectorAll('#eventsTable tbody tr.highlight').forEach(r => r.classList.remove('highlight'));
  if (rows.length > 0) {
    rows.forEach(r => r.classList.add('highlight'));
    rows[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(() => rows.forEach(r => r.classList.remove('highlight')), 3000);
  }
}

function buildAnnotations(filtered) {
  const startDate = new Date(filtered[0].date + 'T00:00:00');
  const endDate = new Date(filtered[filtered.length - 1].date + 'T23:59:59');
  const ann = {};
  PORTFOLIO_CHANGES.forEach((pc, i) => {
    const pd = new Date(pc.date + 'T12:00:00');
    if (pd < startDate || pd > endDate) return;
    const clr = pc.type === '13F-HR' ? 'rgba(37,99,235,0.22)'
      : pc.type.includes('13D') || pc.type === 'Proxy Fight' ? 'rgba(220,38,38,0.22)'
      : pc.type === 'Substantial Holding' || pc.type === 'Derivative Notification' ? 'rgba(22,163,74,0.28)'
      : pc.type === 'Activist Letter' || pc.type === 'Board Appointment' ? 'rgba(147,51,234,0.22)'
      : pc.type === 'Shareholder Proposal' || pc.type === 'TCFD Report' ? 'rgba(234,179,8,0.25)'
      : 'rgba(107,114,128,0.2)';
    let closest = filtered[0].date, minD = Infinity;
    filtered.forEach(m => { const diff = Math.abs(new Date(m.date + 'T12:00:00') - pd); if (diff < minD) { minD = diff; closest = m.date; } });
    ann['ev' + i] = {
      type: 'line', xMin: closest, xMax: closest,
      borderColor: clr, borderWidth: 1.5, borderDash: [5, 4],
      label: {
        display: false,
        content: pc.type + ': ' + (pc.company||'').substring(0, 20),
        position: 'start', backgroundColor: 'rgba(0,0,0,0.85)', color: '#fff',
        font: { size: 10, weight: '500' }, padding: { top: 4, bottom: 4, left: 8, right: 8 }, cornerRadius: 4
      },
      enter(ctx) { ctx.element.options.label.display = true; ctx.chart.canvas.style.cursor = 'pointer'; ctx.chart.draw(); },
      leave(ctx) { ctx.element.options.label.display = false; ctx.chart.canvas.style.cursor = 'default'; ctx.chart.draw(); },
      click() { scrollToEvent(pc.date); }
    };
  });
  return ann;
}

function renderLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = '';
  Object.entries(series).forEach(([key, s]) => {
    const div = document.createElement('div');
    div.className = 'legend-item' + (s.visible ? '' : ' muted');
    const dashCls = s.dash ? ' dashed' : '';
    div.innerHTML = `<span class="swatch${dashCls}" style="--c:${s.color}"></span>${s.label}`;
    div.onclick = () => { s.visible = !s.visible; buildChart(); };
    el.appendChild(div);
  });
}

function buildChart() {
  renderLegend();
  const isCum = currentView === 'cumulative';
  const filtered = isCum ? filterByRange(currentRange) : filterReturnsByRange(currentRange);
  let src;
  if (isCum) {
    const base = filtered[0];
    src = filtered.map(m => ({ date: m.date, known: m.known / base.known, sp500: m.sp500 / base.sp500 }));
  } else { src = filtered; }

  updateHero(isCum ? src : filterByRange(currentRange).map((m,i,arr) => ({ ...m, known: m.known/arr[0].known, sp500: m.sp500/arr[0].sp500 })));
  updateStats(isCum ? src : filterByRange(currentRange).map((m,i,arr) => ({ ...m, known: m.known/arr[0].known, sp500: m.sp500/arr[0].sp500 })));

  const labels = src.map(m => m.date);
  const datasets = [];
  if (series.known.visible) datasets.push({ label: series.known.label, data: src.map(m => isCum ? m.known : m.known * 100), borderColor: series.known.color, backgroundColor: 'rgba(59,130,246,0.05)', fill: isCum, borderWidth: 2.5, pointRadius: 2, pointHoverRadius: 5, pointHoverBackgroundColor: series.known.color, tension: 0.25 });
  if (series.sp500.visible) datasets.push({ label: series.sp500.label, data: src.map(m => isCum ? m.sp500 : m.sp500 * 100), borderColor: series.sp500.color, backgroundColor: 'transparent', fill: false, borderWidth: 1.5, pointRadius: 2, pointHoverRadius: 5, pointHoverBackgroundColor: series.sp500.color, tension: 0.25 });

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('mainChart'), {
    type: 'line', data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(255,255,255,0.97)', titleColor: '#111', bodyColor: '#333',
          titleFont: { size: 13, weight: '600' }, bodyFont: { size: 12 },
          padding: 14, cornerRadius: 8, borderColor: '#d1d5db', borderWidth: 1,
          boxWidth: 16, boxHeight: 2,
          callbacks: {
            title(items) { const d = new Date(items[0].label + 'T12:00:00'); return d.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' }); },
            label(ctx) { const v = ctx.parsed.y; return isCum ? ` ${ctx.dataset.label}: $${v.toFixed(3)}` : ` ${ctx.dataset.label}: ${v >= 0 ? '+' : ''}${v.toFixed(2)}%`; },
            labelColor(ctx) { const ds = ctx.dataset; return { borderColor: ds.borderColor, backgroundColor: ds.borderColor, borderWidth: ds.borderWidth || 2, borderDash: ds.borderDash || [] }; }
          }
        },
        annotation: { annotations: buildAnnotations(src) }
      },
      scales: {
        x: {
          type: 'category', grid: { color: 'rgba(0,0,0,0.05)', drawTicks: false },
          ticks: {
            color: '#888', font: { size: 11 }, maxRotation: 0, padding: 8, autoSkip: false,
            callback(val, i) {
              const d = labels[i]; if (!d) return '';
              const parts = d.split('-'); const yr = parseInt(parts[0]); const mo = parseInt(parts[1]);
              const total = labels.length;
              const mN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
              // Monthly data: show every quarter for long ranges, every month for short
              if (total > 30) { if (mo === 1) return 'Jan ' + yr; if (mo === 7) return 'Jul'; return ''; }
              if (total > 12) { if (mo % 3 === 1) return mN[mo-1] + ' ' + String(yr).slice(-2); return ''; }
              return mN[mo-1] + ' ' + String(yr).slice(-2);
            }
          }
        },
        y: { grid: { color: 'rgba(0,0,0,0.05)', drawTicks: false }, ticks: { color: '#888', font: { size: 11 }, padding: 10, callback: v => isCum ? '$' + v.toFixed(2) : v.toFixed(1) + '%' } }
      },
      layout: { padding: { top: 10, right: 10, bottom: 4, left: 4 } }
    }
  });
}

function buildYearlyCards() {
  const grid = document.getElementById('yearlyGrid');
  const years = [2022, 2023, 2024, 2025];
  grid.innerHTML = '';
  years.forEach(yr => {
    // Find last trading day in Dec of each year
    const prevDec = DAILY.filter(m => m.date.startsWith((yr-1) + '-12'));
    const yrDec = DAILY.filter(m => m.date.startsWith(yr + '-12'));
    const prevEnd = prevDec.length ? prevDec[prevDec.length - 1] : null;
    const yrEnd = yrDec.length ? yrDec[yrDec.length - 1] : null;
    if (!prevEnd || !yrEnd) return;
    const shadowRet = ((yrEnd.known / prevEnd.known) - 1) * 100;
    const sp500Ret = ((yrEnd.sp500 / prevEnd.sp500) - 1) * 100;
    const rep = TCI_REPORTED[yr];
    const alpha = shadowRet - sp500Ret;
    const fmt = (v) => (v >= 0 ? '+' : '') + v.toFixed(1) + '%';
    const clr = (v) => v >= 0 ? 'green' : 'red';

    const card = document.createElement('div');
    card.className = 'year-card';
    card.innerHTML = `
      <div class="year-title">${yr}</div>
      <div class="yr-row"><span class="yr-label" style="font-weight:700;color:#111">TCI Shadow</span><span class="yr-val ${clr(shadowRet)}" style="font-weight:700">${fmt(shadowRet)}</span></div>
      <div class="yr-divider"></div>
      <div class="yr-row"><span class="yr-label">TCI Reported <span class="yr-badge">NET</span></span><span class="yr-val ${clr(rep.ret)}"><a class="yr-link" href="${rep.url}" target="_blank" rel="noopener">${fmt(rep.ret)} ↗</a></span></div>
      <div class="yr-row" style="padding-left:12px"><span class="yr-label" style="font-size:11px;color:#aaa">vs TCI Shadow</span><span class="yr-val" style="font-size:12px;color:${(rep.ret - shadowRet) >= 0 ? '#16a34a' : '#dc2626'}">${(rep.ret - shadowRet) >= 0 ? '+' : ''}${(rep.ret - shadowRet).toFixed(1)}pp</span></div>
      <div class="yr-divider"></div>
      <div class="yr-row"><span class="yr-label">S&P 500 TR</span><span class="yr-val ${clr(sp500Ret)}">${fmt(sp500Ret)}</span></div>
      <div class="yr-row" style="padding-left:12px"><span class="yr-label" style="font-size:11px;color:#aaa">vs TCI Shadow</span><span class="yr-val" style="font-size:12px;color:${(sp500Ret - shadowRet) >= 0 ? '#16a34a' : '#dc2626'}">${(sp500Ret - shadowRet) >= 0 ? '+' : ''}${(sp500Ret - shadowRet).toFixed(1)}pp</span></div>`;
    grid.appendChild(card);
  });
}

const EVENT_TO_PERIOD = [
  'Dec-21',  // 0  2022-01-25 SC 13D/A CNI
  'Dec-21',  // 1  2022-02-14 13F Q4 2021
  'Dec-21',  // 2  2022-03-01 Shareholder Proposals
  'Mar-22',  // 3  2022-03-22 Proxy Fight CNR
  'Mar-22',  // 4  2022-04-01 Shareholder Proposals
  'Mar-22',  // 5  2022-05-16 13F Q1 2022
  'Jun-22',  // 6  2022-08-15 13F Q2 2022
  'Sep-22',  // 7  2022-11-14 13F Q3 2022
  'Sep-22',  // 8  2022-11-15 Activist Letter GOOG
  'Dec-22',  // 9  2023-01-20 Activist Letter GOOG
  'Dec-22',  // 10 2023-02-14 13F Q4 2022
  'Dec-22',  // 11 2023-02-20 Activist Letter Airbus
  'Dec-22',  // 12 2023-03-23 Activist Letter Cellnex
  'Dec-22',  // 13 2023-03-23 Substantial Holding Cellnex
  'Mar-23',  // 14 2023-05-15 13F Q1 2023
  'Mar-23',  // 15 2023-05-17 Substantial Holding Ferrovial
  'Jun-23',  // 16 2023-06-01 Board Appointment Cellnex

  'Jun-23',  // 18 2023-08-14 13F Q2 2023
  'Sep-23',  // 19 2023-11-14 13F Q3 2023
  'Dec-23*', // 20 2024-02-14 13F Q4 2023
  'Dec-23*', // 21 2024-03-01 Shareholder Proposals
  'Mar-24',  // 22 2024-05-15 13F Q1 2024
  'Mar-24',  // 23 2024-06-01 Activist AENA
  'Jun-24',  // 24 2024-08-14 13F Q2 2024
  'Sep-24',  // 25 2024-11-01 SC 13D/A CNI
  'Sep-24',  // 26 2024-11-14 13F Q3 2024
  'Dec-24',  // 27 2025-02-14 13F Q4 2024
  'Dec-24',  // 28 2025-03-01 Shareholder Proposals
  'Mar-25',  // 29 2025-04-30 SC 13D/A CNI
  'Mar-25',  // 30 2025-05-15 13F Q1 2025
  'Jun-25',  // 31 2025-06-01 TCFD Report
  'Jun-25',  // 32 2025-08-14 13F Q2 2025
  'Sep-25',  // 33 2025-11-14 13F Q3 2025
  'Dec-25'   // 34 2026-02-14 13F Q4 2025
];

function getEventsByPeriod() {
  const map = {};
  PORTFOLIO_CHANGES.forEach((ev, idx) => {
    const p = EVENT_TO_PERIOD[idx];
    if (!p) return;
    if (!map[p]) map[p] = [];
    map[p].push(idx);
  });
  return map;
}

function periodQuarterLabel(period) {
  const clean = period.replace('*', '');
  const parts = clean.split('-');
  let mo, yr;
  if (parts.length === 3) { mo = parts[1]; yr = '20' + parts[2]; }
  else { mo = parts[0]; yr = '20' + parts[1]; }
  const qMap = { 'Dec': 'Q4', 'Mar': 'Q1', 'Jun': 'Q2', 'Sep': 'Q3', 'Feb': 'Late Q4' };
  return (qMap[mo] || mo) + ' ' + yr;
}

function buildHoldingsTab() {
  const select = document.getElementById('holdingsPeriodSelect');
  const eventsByPeriod = getEventsByPeriod();

  // Only show periods that have associated events, most recent first
  const periodsWithEvents = HOLDINGS_PERIODS.filter(p => eventsByPeriod[p]);
  const reversed = [...periodsWithEvents].reverse();

  reversed.forEach(p => {
    const evIdxs = eventsByPeriod[p];
    const primary13F = evIdxs.find(i => PORTFOLIO_CHANGES[i].type === '13F-HR');
    const primaryEv = primary13F !== undefined ? PORTFOLIO_CHANGES[primary13F] : PORTFOLIO_CHANGES[evIdxs[0]];
    const otherCount = evIdxs.length - 1;

    let label = periodQuarterLabel(p) + '  ·  ' + primaryEv.type + ' (' + primaryEv.date + ')';
    if (otherCount > 0) label += '  +' + otherCount + ' event' + (otherCount > 1 ? 's' : '');

    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = label;
    select.appendChild(opt);
  });

  select.addEventListener('change', () => renderHoldings(select.value));
  renderHoldings(select.value);
}

function renderHoldings(period) {
  const tbl = document.querySelector('#holdingsTable tbody');
  tbl.innerHTML = '';
  const periodIdx = HOLDINGS_PERIODS.indexOf(period);
  const prevPeriod = periodIdx > 0 ? HOLDINGS_PERIODS[periodIdx - 1] : null;
  const eventsByPeriod = getEventsByPeriod();
  const eventIdxs = eventsByPeriod[period] || [];
  const summaryEl = document.getElementById('holdingsEventsSummary');

  // Build event cards
  let evHTML = '<div class="holdings-events-list">';
  eventIdxs.forEach(idx => {
    const ev = PORTFOLIO_CHANGES[idx];
    const bc = ev.type === '13F-HR' ? 'badge-13f' : (ev.type.includes('13D') || ev.type === 'Proxy Fight') ? 'badge-13d' : (ev.type === 'Substantial Holding' || ev.type === 'Derivative Notification') ? 'badge-eu' : (ev.type === 'Activist Letter' || ev.type === 'Board Appointment') ? 'badge-activist' : (ev.type === 'Shareholder Proposal' || ev.type === 'TCFD Report') ? 'badge-proposal' : 'badge-other';
    const onclick = ev.url ? `onclick="window.open('${ev.url}','_blank')"` : '';
    evHTML += `<div class="holdings-event-card" ${onclick}>
      <span class="ev-date">${ev.date}</span>
      <span class="badge ${bc}">${ev.type}</span>
      <span class="ev-company">${ev.company || ''}</span>
      <span class="ev-detail">${ev.details || ''}</span>
    </div>`;
  });
  evHTML += '</div>';

  // Gather current & previous holdings, compute changes
  const rows = [];
  let total = 0;
  const changes = { new: [], exited: [], increased: [], decreased: [], unchanged: [] };

  Object.entries(HOLDINGS).forEach(([name, h]) => {
    const val = h.values[period] || 0;
    const prev = prevPeriod ? (h.values[prevPeriod] || 0) : 0;

    if (val > 0) {
      const chgPct = prev > 0 ? ((val / prev) - 1) * 100 : null;
      const chgDollar = val - prev;
      let status;
      if (prev === 0 || prev === undefined) status = 'new';
      else if (chgPct > 5) status = 'increased';
      else if (chgPct < -5) status = 'decreased';
      else status = 'unchanged';
      rows.push({ name, region: h.region, val, prev, chgPct, chgDollar, status });
      total += val;
      if (status !== 'unchanged') changes[status].push(name);
    } else if (prev > 0 && val <= 0) {
      rows.push({ name, region: h.region, val: 0, prev, chgPct: -100, chgDollar: -prev, status: 'exited' });
      changes.exited.push(name);
    }
  });

  // Sort: active by value desc, then exited at bottom
  rows.sort((a, b) => {
    if (a.status === 'exited' && b.status !== 'exited') return 1;
    if (b.status === 'exited' && a.status !== 'exited') return -1;
    return b.val - a.val;
  });

  // Change summary chips
  let chipsHTML = '<div class="holdings-change-summary">';
  if (!prevPeriod) {
    chipsHTML += '<span class="change-chip change-chip-init">Initial portfolio snapshot</span>';
  } else {
    if (changes.new.length) chipsHTML += `<span class="change-chip change-chip-new">● ${changes.new.length} New: ${changes.new.join(', ')}</span>`;
    if (changes.exited.length) chipsHTML += `<span class="change-chip change-chip-exit">● ${changes.exited.length} Exited: ${changes.exited.join(', ')}</span>`;
    if (changes.increased.length) chipsHTML += `<span class="change-chip change-chip-up">↑ ${changes.increased.length} Increased</span>`;
    if (changes.decreased.length) chipsHTML += `<span class="change-chip change-chip-down">↓ ${changes.decreased.length} Decreased</span>`;
    const totalChanges = changes.new.length + changes.exited.length + changes.increased.length + changes.decreased.length;
    if (totalChanges === 0) chipsHTML += '<span class="change-chip change-chip-init">No material changes</span>';
  }
  chipsHTML += '</div>';
  summaryEl.innerHTML = evHTML + chipsHTML;

  // Build table rows
  const colors = ['#3b82f6','#8b5cf6','#06b6d4','#10b981','#f59e0b','#ef4444','#ec4899','#6366f1','#14b8a6','#f97316','#84cc16','#a855f7','#e11d48','#0ea5e9','#22c55e','#eab308','#64748b'];

  rows.forEach((r, i) => {
    const pct = total > 0 ? (r.val / total * 100) : 0;
    const tr = document.createElement('tr');

    // Row class by status
    if (r.status === 'new') tr.className = 'row-new';
    else if (r.status === 'exited') tr.className = 'row-exited';
    else if (r.status === 'increased') tr.className = 'row-increased';
    else if (r.status === 'decreased') tr.className = 'row-decreased';

    // Change cell content
    let chgStr = '', chgClass = '';
    if (r.status === 'new') {
      chgStr = '<span class="chg-label chg-label-new">NEW</span>';
      chgClass = 'green';
    } else if (r.status === 'exited') {
      chgStr = '<span class="chg-label chg-label-exit">EXITED</span> was $' + r.prev.toLocaleString() + 'M';
      chgClass = 'red';
    } else if (r.chgPct !== null) {
      const arrow = r.chgPct >= 0 ? '↑' : '↓';
      chgStr = `${arrow} ${r.chgPct >= 0 ? '+' : ''}${r.chgPct.toFixed(1)}% ($${r.chgDollar >= 0 ? '+' : ''}${r.chgDollar.toLocaleString()}M)`;
      chgClass = r.chgPct >= 5 ? 'green' : r.chgPct < -5 ? 'red' : '';
    }

    const regionBadge = r.region === 'EU' ? '<span class="region-badge region-eu">EU</span>' : '<span class="region-badge region-us">US</span>';
    const barColor = colors[i % colors.length];
    const nameStyle = r.status === 'exited' ? 'text-decoration:line-through;color:#999' : '';

    tr.innerHTML = `
      <td><strong style="${nameStyle}">${r.name}</strong></td>
      <td>${regionBadge}</td>
      <td class="right" style="font-variant-numeric:tabular-nums">${r.status === 'exited' ? '—' : '$' + r.val.toLocaleString() + 'M'}</td>
      <td class="right" style="font-variant-numeric:tabular-nums">${r.status === 'exited' ? '—' : pct.toFixed(1) + '%'}</td>
      <td>${r.status === 'exited' ? '' : '<span class="pct-bar" style="width:' + (pct * 1.5) + 'px;background:' + barColor + '"></span>'}</td>
      <td class="right ${chgClass}" style="font-variant-numeric:tabular-nums;font-size:12px">${chgStr}</td>`;
    tbl.appendChild(tr);
  });

  // Total row (active only)
  const activeTotal = rows.filter(r => r.status !== 'exited').reduce((s, r) => s + r.val, 0);
  const prevTotal = prevPeriod ? Object.values(HOLDINGS).reduce((s, h) => s + (h.values[prevPeriod] || 0), 0) : 0;
  const totalChg = prevTotal > 0 ? ((activeTotal / prevTotal - 1) * 100) : 0;
  const totalChgStr = prevPeriod && prevTotal > 0 ? ` (${totalChg >= 0 ? '+' : ''}${totalChg.toFixed(1)}%)` : '';
  const totalTr = document.createElement('tr');
  totalTr.className = 'total-row';
  totalTr.innerHTML = `<td>Total</td><td></td><td class="right">$${activeTotal.toLocaleString()}M</td><td class="right">100%</td><td></td><td class="right" style="font-size:12px">${totalChgStr}</td>`;
  tbl.appendChild(totalTr);

  // Doughnut chart (active holdings only)
  const activeRows = rows.filter(r => r.status !== 'exited');
  if (holdingsChart) holdingsChart.destroy();
  holdingsChart = new Chart(document.getElementById('holdingsChart'), {
    type: 'doughnut',
    data: {
      labels: activeRows.map(r => r.name),
      datasets: [{ data: activeRows.map(r => r.val), backgroundColor: activeRows.map((_, i) => colors[i % colors.length]), borderWidth: 2, borderColor: '#fff' }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { font: { size: 12 }, padding: 12, usePointStyle: true, pointStyle: 'circle' } },
        tooltip: {
          callbacks: {
            label(ctx) { const v = ctx.parsed; const t = ctx.dataset.data.reduce((a,b)=>a+b,0); return ` ${ctx.label}: $${v.toLocaleString()}M (${(v/t*100).toFixed(1)}%)`; }
          }
        }
      }
    }
  });
}

buildHoldingsTab();

// ===== INIT =====
buildChart();
